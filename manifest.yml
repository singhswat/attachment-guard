modules:
  jira:issuePanel:
    - key: attachment-guard-panel
      resource: main
      resolver:
        function: resolver
      viewportSize: medium
      title: ⚠️ Project Governance
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg

  jira:projectSettingsPage:
    - key: project-governance-settings
      resource: main
      resolver:
        function: resolver
      title: Project Data Classification

  function:
    - key: resolver
      handler: index.handler      

resources:
  - key: main
    path: static/frontend/build

permissions:
  scopes:
    - read:jira-work
    - write:jira-work   # 👈 REQUIRED for saving config
    - manage:jira-project   # ✅ ADD THIS

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/5e7b9c10-6e51-40be-a84d-e517b99a9caf